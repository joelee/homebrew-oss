name: Test Formula

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-formula:
    strategy:
      fail-fast: false
      matrix:
        formula:
          - cli-bot
          - gmail-tool
    runs-on: macos-latest

    steps:
      - name: Check out tap repository
        uses: actions/checkout@v4

      - name: Set up Homebrew tap
        run: |
          brew tap joelee/oss "$GITHUB_WORKSPACE"

      - name: Install formula from source
        run: |
          brew install --build-from-source "joelee/oss/${{ matrix.formula }}"

      - name: Run formula test
        run: |
          brew test "joelee/oss/${{ matrix.formula }}"

      - name: Audit formula
        run: |
          brew audit --strict "joelee/oss/${{ matrix.formula }}"
